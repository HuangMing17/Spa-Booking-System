version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bonlai-mysql
    restart: always
    environment:
      MYSQL_DATABASE: exercise201
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./bonlai
      dockerfile: Dockerfile
    container_name: bonlai-api
    restart: always
    ports:
      - "8080:8080" # Đồng bộ với Frontend mặc định (8080)
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/exercise201?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - FIREBASE_CREDENTIALS_BASE64=${FIREBASE_CREDENTIALS_BASE64}
      - INITIAL_ADMIN_USERNAME=spadmin_secure
      - INITIAL_ADMIN_PASSWORD=change_this_password_123456
    volumes:
      - bonlai-uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontendbonlai
      dockerfile: Dockerfile
    container_name: bonlai-frontend
    restart: always
    ports:
      - "8082:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  bonlai-uploads:
