version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bonlai-mysql
    restart: always
    environment:
      MYSQL_DATABASE: webthuoc
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./bonlai
      dockerfile: Dockerfile
    container_name: bonlai-api
    restart: always
    ports:
      - "8081:8080" # Optional, Nginx in frontend container proxies this anyway
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/webthuoc?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    volumes:
      - bonlai-uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontendbonlai
      dockerfile: Dockerfile
    container_name: bonlai-frontend
    restart: always
    ports:
      - "8082:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  bonlai-uploads:
