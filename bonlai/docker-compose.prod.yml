version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bonlai-mysql-prod
    restart: always
    environment:
      MYSQL_DATABASE: exercise201
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data-prod:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bonlai-api-prod
    restart: always
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/exercise201?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - FIREBASE_CREDENTIALS_BASE64=${FIREBASE_CREDENTIALS_BASE64}
    depends_on:
      - db

volumes:
  mysql-data-prod:
