# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Database Configuration
spring.datasource.url=jdbc:mysql://db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8080


# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false

# Security Logging (Production level)
logging.level.org.springframework.security=INFO

# Management Endpoints (Health Check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.server.port=8080

# File Upload Configuration
file.upload-dir=${user.dir}/uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Firebase Configuration
firebase.service-account-key=classpath:firebase-service-account.json
firebase.project-id=${FIREBASE_PROJECT_ID}

# Email Configuration (Gmail SMTP)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Set default mail encoding to UTF-8
spring.mail.default-encoding=UTF-8

# Email Template Configuration
spa.email.from=${MAIL_FROM}
spa.email.from-name=${MAIL_FROM_NAME}
# Using Unicode escapes for Vietnamese characters
spa.email.subject.booking-confirmation=X\u00E1c nh\u1EADn \u0111\u1EB7t l\u1ECBch h\u1EB9n - SPA Bon Lai

# VNPay Configuration
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.url=${VNPAY_URL}
vnpay.return-url=${VNPAY_RETURN_URL}
