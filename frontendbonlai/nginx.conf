server {
    listen 80;
    server_name localhost;

    # Nơi chứa code frontend
    root /usr/share/nginx/html;
    index index.html;

    # Xử lý React Router: Nếu không tìm thấy file, trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bắt tất cả các Request bắt đầu bằng /api và đẩy cho Backend Spring Boot
    location /api/ {
        # Dùng Docker DNS resolver để luôn lấy IP mới nhất của backend
        resolver 127.0.0.11 valid=10s;
        set $backend http://backend:8080;

        # Rewrite để strip prefix /api/ trước khi chuyển tiếp
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
