server {
    listen 80;
    server_name localhost;

    # Ẩn thông tin thương hiệu máy chủ để hacker không biết cấu hình
    server_tokens off;

    # Nơi chứa code frontend
    root /usr/share/nginx/html;
    index index.html;

    # ─── BẢO MẬT: Chặn endpoint nguy hiểm (404) ────────
    location ~ ^/(\.env|\.git|\.gitignore|\.htaccess|config\.php) {
        return 404;
    }

    location ~ ^/(actuator|swagger-ui|api-docs|v2/api-docs|v3/api-docs|h2-console|wp-admin|phpmyadmin) {
        return 404;
    }

    # ─── Spring Boot API (Đã tối ưu proxy) ───────────
    location /api/ {
        # Giữ nguyên tiền tố /api khi proxy để request đi đúng vào custom controller
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Tăng timeout cho các tác vụ nặng
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /auth/ {
        proxy_pass http://backend:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── React SPA Routing ──────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bảo mật nâng cao: Chặn các file ẩn
    location ~ /\. {
        deny all;
    }
}
